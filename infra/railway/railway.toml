[build]
# Railway detects Node.js automatically; override builder to use Dockerfile for
# reproducible builds consistent with local development.
builder = "DOCKERFILE"
dockerfilePath = "infra/docker/Dockerfile"

[deploy]
# Start command — Railway overrides ENTRYPOINT/CMD if set here
# Leave unset to use Dockerfile CMD: node dist/index.js
startCommand = "node dist/index.js"

# Rolling restart — zero downtime deploys
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Health check — Railway marks deploy successful only when this returns 200
healthcheckPath = "/api/health"
healthcheckTimeout = 30

# Minimum number of instances (Pro plan feature)
# numReplicas = 1
